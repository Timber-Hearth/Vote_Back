services:
  db:
    image: postgres:17-alpine
    container_name: secretvote-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vote_db}
      POSTGRES_USER: ${POSTGRES_USER:-ggwp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qwerty614}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: secretvote-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secretvote-backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ggwp}:${POSTGRES_PASSWORD:-qwerty614}@db:5432/${POSTGRES_DB:-vote_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    command: sh -c "uvicorn src.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:


